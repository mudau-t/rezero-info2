<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Links | Re:Zero Info</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: #e5e7eb;
    }

    /* Top image */
    .header-image img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      display: block;
    }

    .container {
      display: flex;
      min-height: calc(100vh - 240px);
    }

    /* Side navigation */
    .sidebar {
      width: 140px;
      background-color: #020617;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar a {
      text-decoration: none;
      color: #e5e7eb;
      background-color: #1e293b;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      font-size: 14px;
    }

    .sidebar a:hover {
      background-color: #334155;
    }

    /* Main content */
    .content {
      flex: 1;
      padding: 20px;
      max-width: 700px;
    }

    h1 {
      color: #60a5fa;
      font-size: 24px;
      margin-top: 0;
    }

    /* Clean link cards */
    .link-card {
      display: block;
      background-color: #020617;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-decoration: none;
      color: #e5e7eb;
      text-align: center;
    }

    .link-card:hover {
      background-color: #1e293b;
    }

    .link-card strong {
      font-size: 17px;
      color: #38bdf8;
    }

    .link-card span {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #93c5fd;
    }

    /* Mobile layout */
    @media (max-width: 700px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        justify-content: space-around;
      }
    }
  </style>
</head>
<body>

  <!-- Top Image -->
  <div class="header-image">
    <img src="https://files.catbox.moe/orvyfc.jpg" alt="Re:Zero Banner">
  </div>

  <div class="container">

    <!-- Side Buttons -->
    <nav class="sidebar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="links.html">Links</a>
      <a href="support.html">Support</a>
    </nav>

    <!-- Page Content -->
    <main class="content">
      <h1>Community Links</h1>

      <a class="link-card"
         href="https://chat.whatsapp.com/EJjjbFxlRx0KIpDwpzpRD1"
         target="_blank">
        <strong>Our Community</strong>
        <span>Join our WhatsApp community</span>
      </a>

      <a class="link-card"
         href="https://whatsapp.com/channel/0029Vb7EosF9hXFBUaF5PT1E"
         target="_blank">
        <strong>Our Channel</strong>
        <span>Follow our WhatsApp channel</span>
      </a>

      <a class="link-card"
         href="https://discord.gg/cqz3RNtwY"
         target="_blank">
        <strong>Our Discord Server</strong>
        <span>Join the Discord community</span>
      </a>

    </main>

  </div>

</body>
</html>
